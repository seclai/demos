name = "jailbreak-arcade"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Deployed as a Cloudflare Worker (Astro SSR via @astrojs/cloudflare).
# The adapter generates the entry + assets config into ./dist/server/wrangler.json
# at build time and merges these bindings in.

[[kv_namespaces]]
binding = "JAILBREAK_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"
